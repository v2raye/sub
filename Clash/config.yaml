mixed-port: 7890

mode: rule
log-level: warning
# 开启 IPv6 总开关
ipv6: true
udp: true
allow-lan: false
bind-address: 127.0.0.1
unified-delay: true
tcp-concurrent: true
disable-keep-alive: true
find-process-mode: off

external-controller: 127.0.0.1:9090
secret: ""

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  override-destination: false
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  mtu: 1500
  udp-timeout: 300
  endpoint-independent-nat: false
dns:
  enable: true
  listen: '127.0.0.1:5450'
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localdomain"
    - "*.arpa"
    - "localhost.ptlogin2.qq.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "+.time.*"
    - "+.ntp.*"
    - "+.pool.ntp.org"
    - "+.v2raye.com"
    # 引用 RuleSet
#    - 'rule-set:CN_domain'
#    - 'rule-set:Private_domain'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 2400:3200::1
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://dns.google/dns-query
    - https://dns11.quad9.net/dns-query
    - https://security.cloudflare-dns.com/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://dns.google/dns-query
    - https://dns11.quad9.net/dns-query
    - https://security.cloudflare-dns.com/dns-query
#  nameserver-policy:
#    'rule-set:CN_domain':
#      - https://dns.alidns.com/dns-query
#    'rule-set:Private_domain':
#      - https://dns.alidns.com/dnys-quer
#    'rule-set:OpenAI':
#      - https://dns.google/dns-query
#      - https://dns11.quad9.net/dns-query
#      - https://security.cloudflare-dns.com/dns-query
#    'rule-set:Proxy':
#      - https://dns.google/dns-query
#      - https://dns11.quad9.net/dns-query
#     - https://security.cloudflare-dns.com/dns-query
proxies:
# 锚点 - 节点订阅的参数 [每小时更新一次订阅节点，每 6 秒一次健康检查]
NodeParam: &NodeParam {type: http, interval: 86400, health-check: {enable: true, url: "https://cp.cloudflare.com/generate_204", interval: 1800, timeout: 5000, lazy: true, expected-status: 204}, override: {udp: true, ip-version: dual, tfo: false, mptcp: false}}
# 锚点 - 节点订阅
proxy-providers: 
  Clash_Meta:
    url: ''
    <<: *NodeParam
    path: './proxy_providers/Clash_Meta.yaml'
# 锚点 - 节点筛选组
FilterHK: &FilterHK '(?i)(🇭🇰|香港|\bHK\b|Hong(?:\s?Kong)?)'
FilterJP: &FilterJP '(?i)(🇯🇵|日本|\bJP\b|Japan)'
FilterUS: &FilterUS '(?i)(🇺🇸|美国|美國|\bUS\b|\bUSA\b|United States)'

# 策略组参数锚点
# 锚点 - 时延优选参数
UrlTest: &UrlTest {type: url-test, include-all: true, url: "https://cp.cloudflare.com/generate_204", interval: 600, tolerance: 80, timeout: 5000, lazy: true}

proxy-groups: 
  - {name: Outside, type: select, proxies: [HK, JP, US, DIRECT]}
  - {name: Samsung, type: select, proxies: [HK, JP, US, DIRECT]}
  - {name: Google, type: select, proxies: [HK, JP, US]}
  - {name: Telegram, type: select, proxies: [HK, JP, US]}
  - {name: HK, <<: *UrlTest, filter: *FilterHK}
  - {name: JP, <<: *UrlTest, filter: *FilterJP}
  - {name: US, type: select, include-all: true, filter: '(?i)(🇺🇸|美国|美國|\bUS\b|\bUSA\b|\bUnited States\b)'}


rules:
    - IP-CIDR,0.0.0.0/32,REJECT
    - RULE-SET,Private_domain,DIRECT
    - RULE-SET,Private_ip,DIRECT,no-resolve
    - DOMAIN,local.adguard.org,REJECT
    - DOMAIN,injections.adguard.org,Outside
    - OR,((DOMAIN,media.micu.hk),(DOMAIN,emby.as174.de),(DOMAIN,cf.bili.rip),(DOMAIN,cdn.sexemby.com)),HK

    - RULE-SET,Samsung_domain,Samsung
    - RULE-SET,Telegram,Telegram
    - RULE-SET,Google_domain,Google
    - RULE-SET,CN_domain,DIRECT
    - RULE-SET,Proxy,Outside
      
    - RULE-SET,Telegram_ip,Telegram,no-resolve
    - RULE-SET,CN_ip,DIRECT,no-resolve
    - MATCH,Outside
rule-anchor:
  ip: &ip {type: http, interval: 43200, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 43200, behavior: domain, format: mrs}
rule-providers:
#域名类
  Private_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/private.mrs"
  CN_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/v2raye/mihomo-rule/refs/heads/main/rule/mihomo/CN.mrs"
  Samsung_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/v2raye/mihomo-rule/refs/heads/main/rule/mihomo/Samsung.mrs"
  Telegram:
    <<: *domain
    url: "https://raw.githubusercontent.com/v2raye/mihomo-rule/refs/heads/main/rule/mihomo/Telegram-domain.mrs"
  Proxy:
    <<: *domain
    url: "https://raw.githubusercontent.com/v2raye/mihomo-rule/refs/heads/main/rule/mihomo/Global.mrs"
  Google_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/v2raye/mihomo-rule/refs/heads/main/rule/mihomo/YouTube.mrs"  
#IP类
  Private_ip:
    <<: *ip
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geoip/private.mrs"
  CN_ip:
    <<: *ip
    url: "https://raw.githubusercontent.com/v2raye/mihomo-rule/refs/heads/main/rule/mihomo/cncidr.mrs" 
  Telegram_ip:
    <<: *ip
    url: "https://raw.githubusercontent.com/v2raye/mihomo-rule/refs/heads/main/rule/mihomo/Telegram-ipcidr.mrs"  
