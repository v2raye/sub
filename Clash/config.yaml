port: 7890
socks-port: 7891
mixed-port: 7892

#############################################
# иҝҗиЎҢеҹәзәҝ
#############################################
mode: rule                      # еҲҶжөҒжЁЎејҸпјҡrule / global / direct
log-level: warning              # ж—Ҙеҝ—пјҡsilent/error/warning/info/debug
ipv6: true
udp: true                       
allow-lan: true                 
bind-address: "*"               
unified-delay: true             
tcp-concurrent: true            
global-client-fingerprint: chrome  
geox-url:
#  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
#  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
#  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"
profile:
  store-selected: true
  store-fake-ip: true
sniffer:
  enable: true
  override-destination: false
  force-dns-mapping: true
  parse-pure-ip: true  
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
tun:
  enable: true
  stack: system
  device: Meta
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-detect-interface: true
  strict-route: true
dns:
  enable: true
  ipv6: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-filter:
      # йқҷжҖҒеҹҹеҗҚи§„еҲҷ
    - '*.lan'
    - '*.local'
    - '*.localdomain'
    - '*.arpa'
    - 'stun.*.*'
    - 'stun.*.*.*'
    - 'time.*'
    - 'ntp.*'
    - "+.v2raye.com"
    # еј•з”Ё RuleSet
#    - 'rule-set:CN_domain'
#    - 'rule-set:Private_domain'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 2400:3200::1
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://dns.google/dns-query
    - https://dns11.quad9.net/dns-query
    - https://security.cloudflare-dns.com/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://dns.google/dns-query
    - https://dns11.quad9.net/dns-query
    - https://security.cloudflare-dns.com/dns-query
#  nameserver-policy:
#    'rule-set:CN_domain':
#      - https://dns.alidns.com/dns-query
#    'rule-set:Private_domain':
#      - https://dns.alidns.com/dnys-quer
#    'rule-set:OpenAI':
#      - https://dns.google/dns-query
#      - https://dns11.quad9.net/dns-query
#      - https://security.cloudflare-dns.com/dns-query
#    'rule-set:Proxy':
#      - https://dns.google/dns-query
#      - https://dns11.quad9.net/dns-query
#     - https://security.cloudflare-dns.com/dns-query
proxies:
# й”ҡзӮ№ - иҠӮзӮ№и®ўйҳ…зҡ„еҸӮж•° [жҜҸе°Ҹж—¶жӣҙж–°дёҖж¬Ўи®ўйҳ…иҠӮзӮ№пјҢжҜҸ 6 з§’дёҖж¬ЎеҒҘеә·жЈҖжҹҘ]
NodeParam: &NodeParam {type: http, interval: 86400, health-check: {enable: true, url: 'https://cp.cloudflare.com/generate_204', interval: 1800}}
# й”ҡзӮ№ - иҠӮзӮ№и®ўйҳ…
proxy-providers: 
  Clash_Meta:
    url: ''
    <<: *NodeParam
    path: './proxy_providers/Clash_Meta.yaml'
# й”ҡзӮ№ - иҠӮзӮ№зӯӣйҖүз»„
FilterEM: &FilterEM '(?i)(рҹҮӯрҹҮ°|йҰҷжёҜ|HK|Hong|рҹҮ№рҹҮј|еҸ°ж№ҫ|TW|Taiwan)'
FilterHK: &FilterHK '(?i)(рҹҮӯрҹҮ°|йҰҷжёҜ|HK|Hong)'
FilterJP: &FilterJP '(?i)(рҹҮҜрҹҮө|ж—Ҙжң¬|дёңдә¬|еӨ§йҳӘ|JP|Japan)'
FilterSG: &FilterSG '(?i)(рҹҮёрҹҮ¬|ж–°еҠ еқЎ|SG|Singapore)'
FilterUS: &FilterUS '(?i)(рҹҮәрҹҮё|зҫҺеӣҪ|US|United States|жҙӣжқүзҹ¶|зЎ…и°·)'
FilterTW: &FilterTW '(?i)(рҹҮ№рҹҮј|еҸ°ж№ҫ|TW|Taiwan)'
FilterEU: &FilterEU '(?i)\b(UK|GB|DE|FR|NL|IT|ES|CH|SE|NO|PL|FI|AT|BE|DK|IE|PT|CZ|GR|HU|RO|IS|EE|LV|LT|SK|SI|HR|BG|LU)\b|иӢұеӣҪ|еҫ·еӣҪ|жі•еӣҪ|иҚ·е…°|ж„ҸеӨ§еҲ©|иҘҝзҸӯзүҷ|з‘һеЈ«|з‘һе…ё|жҢӘеЁҒ|жіўе…°|иҠ¬е…°|еҘҘең°еҲ©|жҜ”еҲ©ж—¶|дё№йәҰ|зҲұе°”е…°|и‘Ўиҗ„зүҷ|жҚ·е…Ӣ|еёҢи…Ҡ|еҢҲзүҷеҲ©|зҪ—й©¬е°јдәҡ|еҶ°еІӣ|зҲұжІҷе°јдәҡ|жӢүи„ұз»ҙдәҡ|з«Ӣйҷ¶е®ӣ|ж–Ҝжҙӣдјҗе…Ӣ|ж–Ҝжҙӣж–Үе°јдәҡ|е…ӢзҪ—ең°дәҡ|дҝқеҠ еҲ©дәҡ|еҚўжЈ®е Ў|рҹҮ¬рҹҮ§|рҹҮ©рҹҮӘ|рҹҮ«рҹҮ·|рҹҮірҹҮұ|рҹҮ®рҹҮ№|рҹҮӘрҹҮё|рҹҮЁрҹҮӯ|рҹҮёрҹҮӘ|рҹҮірҹҮҙ|рҹҮөрҹҮұ|рҹҮ«рҹҮ®|рҹҮҰрҹҮ№|рҹҮ§рҹҮӘ|рҹҮ©рҹҮ°|рҹҮ®рҹҮӘ|рҹҮөрҹҮ№|рҹҮЁрҹҮҝ|рҹҮ¬рҹҮ·|рҹҮӯрҹҮә|рҹҮ·рҹҮҙ|рҹҮ®рҹҮё|рҹҮӘрҹҮӘ|рҹҮұрҹҮ»|рҹҮұрҹҮ№|рҹҮёрҹҮ°|рҹҮёрҹҮ®|рҹҮӯрҹҮ·|рҹҮ§рҹҮ¬|рҹҮұрҹҮәрҹҮә'
FilterOther: &FilterOther '(?i)^(?!.*(йҰҷжёҜ|рҹҮӯрҹҮ°|\bHK\b|HongKong|еҸ°ж№ҫ|рҹҮ№рҹҮј|\bTW\b|Taiwan|ж—Ҙжң¬|рҹҮҜрҹҮө|\bJP\b|Japan|дёңдә¬|еӨ§йҳӘ|ж–°еҠ еқЎ|рҹҮёрҹҮ¬|\bSG\b|Singapore|зҫҺеӣҪ|рҹҮәрҹҮё|\bUS\b|United States|жҙӣжқүзҹ¶|зЎ…и°·|иӢұеӣҪ|рҹҮ¬рҹҮ§|\bUK\b|еҫ·еӣҪ|рҹҮ©рҹҮӘ|\bDE\b|жі•еӣҪ|рҹҮ«рҹҮ·|\bFR\b|иҚ·е…°|рҹҮірҹҮұ|\bNL\b|ж„ҸеӨ§еҲ©|рҹҮ®рҹҮ№|\bIT\b|иҘҝзҸӯзүҷ|рҹҮӘрҹҮё|\bES\b|з‘һеЈ«|рҹҮЁрҹҮӯ|\bCH\b|з‘һе…ё|рҹҮёрҹҮӘ|\bSE\b|жҢӘеЁҒ|рҹҮірҹҮҙ|\bNO\b|жіўе…°|рҹҮөрҹҮұ|\bPL\b|иҠ¬е…°|рҹҮ«рҹҮ®|\bFI\b|еҘҘең°еҲ©|рҹҮҰрҹҮ№|\bAT\b|жҜ”еҲ©ж—¶|рҹҮ§рҹҮӘ|\bBE\b|дё№йәҰ|рҹҮ©рҹҮ°|\bDK\b|зҲұе°”е…°|рҹҮ®рҹҮӘ|\bIE\b|и‘Ўиҗ„зүҷ|рҹҮөрҹҮ№|\bPT\b|жҚ·е…Ӣ|рҹҮЁрҹҮҝ|\bCZ\b|еёҢи…Ҡ|рҹҮ¬рҹҮ·|\bGR\b|еҢҲзүҷеҲ©|рҹҮӯрҹҮә|\bHU\b|зҪ—й©¬е°јдәҡ|рҹҮ·рҹҮҙ|\bRO\b|еҶ°еІӣ|рҹҮ®рҹҮё|\bIS\b|зҲұжІҷе°јдәҡ|рҹҮӘрҹҮӘ|\bEE\b|жӢүи„ұз»ҙдәҡ|рҹҮұрҹҮ»|\bLV\b|з«Ӣйҷ¶е®ӣ|рҹҮұрҹҮ№|\bLT\b|ж–Ҝжҙӣдјҗе…Ӣ|рҹҮёрҹҮ°|\bSK\b|ж–Ҝжҙӣж–Үе°јдәҡ|рҹҮёрҹҮ®|\bSI\b|е…ӢзҪ—ең°дәҡ|рҹҮӯрҹҮ·|\bHR\b|дҝқеҠ еҲ©дәҡ|рҹҮ§рҹҮ¬|\bBG\b|еҚўжЈ®е Ў|рҹҮұрҹҮә|\bLU\b|ж¬§жҙІ|рҹҮӘрҹҮә|\bEU\b)).*'
FilterRelay: &FilterRelay ^(?i).*?(рҹҮҜрҹҮө|ж—Ҙжң¬|JP|Japan).*$
# зӯ–з•Ҙз»„еҸӮж•°й”ҡзӮ№
# й”ҡзӮ№ - ж—¶е»¶дјҳйҖүеҸӮж•° [жҜҸ 6 з§’дёҖж¬Ўжғ°жҖ§еҒҘеә·жЈҖжҹҘпјҢе®№е·® 20msпјҢж—¶е»¶и¶…иҝҮ 2 з§’еҲӨе®ҡдёәеӨұиҙҘпјҢеӨұиҙҘ 3 ж¬ЎеҲҷиҮӘеҠЁи§ҰеҸ‘еҒҘеә·жЈҖжҹҘ]
UrlTest: &UrlTest {type: url-test, interval: 6, tolerance: 20, lazy: true, url: 'http://www.google.com/blank.html', disable-udp: false, timeout: 2000, max-failed-times: 3, hidden: true, include-all-providers: true}
# й”ҡзӮ№ - ж•…йҡңиҪ¬з§»еҸӮж•° [жҜҸ 6 з§’дёҖж¬Ўжғ°жҖ§еҒҘеә·жЈҖжҹҘпјҢж—¶е»¶и¶…иҝҮ 2 з§’еҲӨе®ҡдёәеӨұиҙҘпјҢеӨұиҙҘ 3 ж¬ЎеҲҷиҮӘеҠЁи§ҰеҸ‘еҒҘеә·жЈҖжҹҘ]
FallBack: &FallBack {type: fallback, interval: 6, lazy: true, url: 'http://www.google.com/blank.html', disable-udp: false, timeout: 2000, max-failed-times: 3, hidden: true, include-all-providers: true}
# й”ҡзӮ№ - иҙҹиҪҪеқҮиЎЎеҸӮж•° [жҜҸ 6 з§’дёҖж¬Ўжғ°жҖ§еҒҘеә·жЈҖжҹҘпјҢж—¶е»¶и¶…иҝҮ 2 з§’еҲӨе®ҡдёәеӨұиҙҘпјҢеӨұиҙҘ 3 ж¬ЎеҲҷиҮӘеҠЁи§ҰеҸ‘еҒҘеә·жЈҖжҹҘ]
LoadBalance: &LoadBalance {type: load-balance, interval: 6, lazy: true, url: 'http://www.google.com/blank.html', disable-udp: false, strategy: consistent-hashing, timeout: 2000, max-failed-times: 3, hidden: true, include-all-providers: true}

proxy-groups: 
  - {name: Outside, type: select, proxies: [HK, JP, SG, US, EU, TW,Other,DIRECT]}
  - {name: Microsoft, type: select, proxies: [HK, JP, SG, US, EU, TW,DIRECT]}  
  - {name: Apple, type: select, proxies: [HK, JP, SG, US, EU, TW,DIRECT]}
  - {name: Google, type: select, proxies: [HK, JP, SG, US, EU, TW]}
  - {name: Telegram, type: select, proxies: [HK, JP, SG, US, EU, TW]}
  - {name: OpenAI, type: select, proxies: [JP, US]}
  - {name: Emby, type: select, proxies: [EM,DIRECT]}
  - {name: HK, <<: *UrlTest, filter: *FilterHK}
  - {name: TW, <<: *UrlTest, filter: *FilterTW}
  - {name: SG, <<: *UrlTest, filter: *FilterSG}
  - {name: JP, <<: *UrlTest, filter: *FilterJP}
  - {name: US, type: select, filter: *FilterUS}
  - {name: EU, <<: *UrlTest, filter: *FilterEU}
  - {name: EM, <<: *UrlTest, filter: *FilterEM}
  - {name: Other, <<: *Smart, filter: *FilterOther}
  - {name: Relay, <<: *LoadBalance, filter: *FilterRelay} 


