port: 7890
socks-port: 7891
mixed-port: 7892

#############################################
# 运行基线
#############################################
mode: rule                      # 分流模式：rule / global / direct
log-level: warning              # 日志：silent/error/warning/info/debug
ipv6: true                      # 总开关（关闭会屏蔽 AAAA）
allow-lan: true                 # 允许局域网设备连接（共享给手机必须开启）
bind-address: "*"               # allow-lan=true 时，"*" 等同 0.0.0.0
unified-delay: true             # 并发测速取最先返回
tcp-concurrent: true            # TCP 并发握手

profile:
  store-selected: true
  store-fake-ip: true
sniffer:
  enable: true
  override-destination: false
  force-dns-mapping: true
  parse-pure-ip: true  
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
tun:
  enable: true
  stack: system
  device: Meta
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-detect-interface: true
  strict-route: true
dns:
  enable: true
  ipv6: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-filter:
      # 静态域名规则
    - '*.lan'
    - '*.local'
    - '*.localdomain'
    - '*.arpa'
    - 'stun.*.*'
    - 'stun.*.*.*'
    - 'time.*'
    - 'ntp.*'
    - "+.v2raye.com"
    # 引用 RuleSet
#    - 'rule-set:CN_domain'
#    - 'rule-set:Private_domain'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 2400:3200::1
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://dns.google/dns-query
    - https://dns11.quad9.net/dns-query
    - https://security.cloudflare-dns.com/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://dns.google/dns-query
    - https://dns11.quad9.net/dns-query
    - https://security.cloudflare-dns.com/dns-query
#  nameserver-policy:
#    'rule-set:CN_domain':
#      - https://dns.alidns.com/dns-query
#    'rule-set:Private_domain':
#      - https://dns.alidns.com/dnys-quer
#    'rule-set:OpenAI':
#      - https://dns.google/dns-query
#      - https://dns11.quad9.net/dns-query
#      - https://security.cloudflare-dns.com/dns-query
#    'rule-set:Proxy':
#      - https://dns.google/dns-query
#      - https://dns11.quad9.net/dns-query
#     - https://security.cloudflare-dns.com/dns-query
proxies:
# 锚点 - 节点订阅的参数 [每小时更新一次订阅节点，每 6 秒一次健康检查]
NodeParam: &NodeParam {type: http, interval: 86400, health-check: {enable: true, url: 'https://cp.cloudflare.com/generate_204', interval: 1800}}
# 锚点 - 节点订阅
proxy-providers: 
  Clash_Meta:
    url: ''
    <<: *NodeParam
    path: './proxy_providers/Clash_Meta.yaml'
# 锚点 - 节点筛选组
# 锚点 - 节点筛选组
FilterEM: &FilterEM '(?i)(🇭🇰|香港|\bHK\b|Hong(?:\s?Kong)?|🇹🇼|台湾|\bTW\b|Taiwan)'
FilterHK: &FilterHK '(?i)(🇭🇰|香港|\bHK\b|Hong(?:\s?Kong)?)'
FilterJP: &FilterJP '(?i)(🇯🇵|日本|东京|大阪|\bJP\b|Japan)'
FilterSG: &FilterSG '(?i)(🇸🇬|新加坡|\bSG\b|Singapore)'
FilterUS: &FilterUS '(?i)(🇺🇸|美国|美國|\bUS\b|\bUSA\b|United States)'
FilterTW: &FilterTW '(?i)(🇹🇼|台湾|\bTW\b|Taiwan)'
FilterEU: &FilterEU '(?i)(\bUK\b|\bGB\b|\bDE\b|\bFR\b|\bNL\b|\bIT\b|\bES\b|\bCH\b|\bSE\b|\bNO\b|\bPL\b|\bFI\b|\bAT\b|\bBE\b|\bDK\b|\bIE\b|\bPT\b|\bCZ\b|\bGR\b|\bHU\b|\bRO\b|\bIS\b|\bEE\b|\bLV\b|\bLT\b|\bSK\b|\bSI\b|\bHR\b|\bBG\b|\bLU\b|英国|德国|法国|荷兰|意大利|西班牙|瑞士|瑞典|挪威|波兰|芬兰|奥地利|比利时|丹麦|爱尔兰|葡萄牙|捷克|希腊|匈牙利|罗马尼亚|冰岛|爱沙尼亚|拉脱维亚|立陶宛|斯洛伐克|斯洛文尼亚|克罗地亚|保加利亚|卢森堡|🇬🇧|🇩🇪|🇫🇷|🇳🇱|🇮🇹|🇪🇸|🇨🇭|🇸🇪|🇳🇴|🇵🇱|🇫🇮|🇦🇹|🇧🇪|🇩🇰|🇮🇪|🇵🇹|🇨🇿|🇬🇷|🇭🇺|🇷🇴|🇮🇸|🇪🇪|🇱🇻|🇱🇹|🇸🇰|🇸🇮|🇭🇷|🇧🇬|🇱🇺|欧洲|🇪🇺|\bEU\b)'
FilterOther: &FilterOther '(?i)^(?!.*(🇭🇰|香港|\bHK\b|Hong(?:\s?Kong)?|🇹🇼|台湾|\bTW\b|Taiwan|🇯🇵|日本|东京|大阪|\bJP\b|Japan|🇸🇬|新加坡|\bSG\b|Singapore|🇺🇸|美国|美國|\bUS\b|\bUSA\b|United States|英国|德国|法国|荷兰|意大利|西班牙|瑞士|瑞典|挪威|波兰|芬兰|奥地利|比利时|丹麦|爱尔兰|葡萄牙|捷克|希腊|匈牙利|罗马尼亚|冰岛|爱沙尼亚|拉脱维亚|立陶宛|斯洛伐克|斯洛文尼亚|克罗地亚|保加利亚|卢森堡|🇬🇧|🇩🇪|🇫🇷|🇳🇱|🇮🇹|🇪🇸|🇨🇭|🇸🇪|🇳🇴|🇵🇱|🇫🇮|🇦🇹|🇧🇪|🇩🇰|🇮🇪|🇵🇹|🇨🇿|🇬🇷|🇭🇺|🇷🇴|🇮🇸|🇪🇪|🇱🇻|🇱🇹|🇸🇰|🇸🇮|🇭🇷|🇧🇬|🇱🇺|欧洲|🇪🇺|\bUK\b|\bGB\b|\bDE\b|\bFR\b|\bNL\b|\bIT\b|\bES\b|\bCH\b|\bSE\b|\bNO\b|\bPL\b|\bFI\b|\bAT\b|\bBE\b|\bDK\b|\bIE\b|\bPT\b|\bCZ\b|\bGR\b|\bHU\b|\bRO\b|\bIS\b|\bEE\b|\bLV\b|\bLT\b|\bSK\b|\bSI\b|\bHR\b|\bBG\b|\bLU\b|\bEU\b)).*'
FilterRelay: &FilterRelay '(?i)(🇯🇵|日本|\bJP\b|Japan)'
# 策略组参数锚点
Smart: &Smart {type: smart,uselightgbm: true, collectdata: false, include-all: true}
# 锚点 - 负载均衡参数 [每 6 秒一次惰性健康检查，时延超过 2 秒判定为失败，失败 3 次则自动触发健康检查]
LoadBalance: &LoadBalance {type: load-balance, interval: 6, lazy: true, url: 'https://cp.cloudflare.com/generate_204', disable-udp: false, strategy: consistent-hashing, timeout: 2000, max-failed-times: 3, hidden: true, include-all-providers: true}

proxy-groups: 
  - {name: Outside, type: select, proxies: [HK, JP, SG, US, EU, TW,Other,DIRECT]}
  - {name: Microsoft, type: select, proxies: [HK, JP, SG, US, EU, TW,DIRECT]}  
  - {name: Apple, type: select, proxies: [HK, JP, SG, US, EU, TW,DIRECT]}
  - {name: Google, type: select, proxies: [HK, JP, SG, US, EU, TW]}
  - {name: Telegram, type: select, proxies: [HK, JP, SG, US, EU, TW]}
  - {name: OpenAI, type: select, proxies: [JP, US]}
  - {name: Emby, type: select, proxies: [EM,DIRECT]}
  - {name: HK, <<: *Smart, filter: *FilterHK}
  - {name: TW, <<: *Smart, filter: *FilterTW}
  - {name: SG, <<: *Smart, filter: *FilterSG}
  - {name: JP, <<: *Smart, filter: *FilterJP}
  - {name: US, <<: *Smart, filter: *FilterUS}
  - {name: EU, <<: *Smart, filter: *FilterEU}
  - {name: EM, <<: *Smart, filter: *FilterEM}
  - {name: Other, <<: *Smart, filter: *FilterOther}
  - {name: Relay, <<: *LoadBalance, filter: *FilterRelay} 


rules:
    - OR,((IP-CIDR,0.0.0.0/32), (IP-CIDR6,::/128)),REJECT
    - OR,((DOMAIN-KEYWORD, adobe),(DOMAIN-SUFFIX,adobe.com),(DOMAIN-SUFFIX,adobe.io),(DOMAIN,local.adguard.org)),REJECT
    - RULE-SET,Private_domain,DIRECT
    - DOMAIN,injections.adguard.org,Outside
    - OR,((DOMAIN,media.micu.hk),(DOMAIN,emby.as174.de),(DOMAIN,cf.bili.rip),(DOMAIN,cdn.sexemby.com)),Emby
    - RULE-SET,OpenAI,OpenAI    
    - RULE-SET,Microsoft,Microsoft
    - RULE-SET,Apple_domain,Apple
    - RULE-SET,Telegram,Telegram
    - RULE-SET,Google_domain,Google
    - RULE-SET,CN_domain,DIRECT
    - RULE-SET,Proxy,Outside
      
    - OR,((IP-CIDR,91.108.12.0/22),(IP-CIDR,149.154.172.0/22),(IP-CIDR6,2001:b28:f23d::/48)),US
    - OR,((IP-CIDR,91.108.4.0/22),(IP-CIDR,91.108.8.0/22),(IP-CIDR,95.161.64.0/20),(IP-CIDR,109.239.140.0/24),(IP-CIDR,149.154.160.0/22),(IP-CIDR,149.154.164.0/22),(IP-CIDR6,2001:67c:4e8::/48)),EU
    - OR,((IP-CIDR,91.108.16.0/22),(IP-CIDR,91.108.56.0/22),(IP-CIDR,149.154.168.0/22),(IP-CIDR6,2001:b28:f23f::/48)),SG
    - OR,((IP-CIDR,5.28.192.0/18),(IP-CIDR,91.105.192.0/23),(IPIP-CIDR,91.108.20.0/22),(IP-CIDR,185.76.151.0/24),(IP-CIDR,139.59.210.98/32),(IP-CIDR,196.55.216.167/32),(IP-CIDR6,2001:b28:f23c::/48),(IP-CIDR6,2a0a:f280::/32)),SG
    - OR,((IP-ASN,211157),(IP-ASN,44907),(IP-ASN,59930),(IP-ASN,62014),(IP-ASN,62041)),SG
    - RULE-SET,Apple_ip,Apple
    - RULE-SET,Google_ip,Google
    - RULE-SET,CN_ip,DIRECT
    - RULE-SET,Private_ip,DIRECT
    - MATCH,Outside
rule-anchor:
  ip: &ip {type: http, interval: 43200, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 43200, behavior: domain, format: mrs}
